<!DOCTYPE html>
<html>
<head>
<title>Student Marks System</title>
<link rel="stylesheet" href="asses.css">
</head>

<body>

<h1>Student Marks Management System</h1>

<div class="form">
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="number" id="math" placeholder="Math Marks">
<input type="number" id="science" placeholder="Science Marks">
<input type="number" id="english" placeholder="English Marks">

<button onclick="addStudent()">Add Student</button>
</div>

<div class="buttons">

<button onclick="displayStudents()">Display All Students</button>
<button onclick="calculateResults()">Calculate Total & Average</button>
<button onclick="showTopStudents()">Average Above 80</button>
<button onclick="showFailed()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>

</div>

<div id="output"></div>

<script src="asses.js"></script>

</body>
</html>
